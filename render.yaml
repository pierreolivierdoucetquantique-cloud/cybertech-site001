# ===========================================================
# CYBER TECK Q — Configuration Render (Infrastructure as Code)
# ===========================================================
# Ce fichier permet à Render de créer automatiquement le service et le
# disk persistant en une seule étape ("Blueprint"), au lieu de tout
# configurer manuellement dans le dashboard.
#
# Voir le guide DEPLOIEMENT.md pour la procédure complète pas-à-pas.
# ===========================================================

services:
  - type: web
    name: cyberteckq
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile

    # --- Disk persistant : stocke la base de données SQLite et les PDF de factures ---
    disk:
      name: cyberteckq-data
      mountPath: /app/data
      sizeGB: 1

    # --- Variables d'environnement ---
    # Les valeurs marquées "sync: false" doivent être saisies manuellement
    # dans le dashboard Render après le premier déploiement (jamais commitées).
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_PATH
        value: /app/data/cyberteckq.db
      - key: UPLOADS_DIR
        value: /app/data/uploads
      - key: COOKIE_SECURE
        value: "True"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: INTERAC_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

    healthCheckPath: /api/health
