<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration | Cyber Teck Q</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0F172A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=910">
<link rel="stylesheet" href="admin.css?v=910">
</head>
<body class="admin-login-body">

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <div class="admin-login-brand">
      <img src="assets/logo-icon.png" alt="Cyber Teck Q" class="admin-login-logo">
      <span>CYBER TECK <strong>Q</strong></span>
    </div>
    <p class="admin-login-tag">Administration</p>

    <form id="admin-login-form">
      <label class="field">
        <span>Courriel</span>
        <input type="email" name="email" required autocomplete="username" placeholder="admin@cyberteckq.com">
      </label>
      <label class="field">
        <span>Mot de passe</span>
        <div class="password-field">
          <input type="password" name="password" id="admin-password" required autocomplete="current-password">
          <button type="button" class="toggle-password" data-target="admin-password" aria-label="Afficher le mot de passe">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </label>
      <button type="submit" class="btn btn-gradient" style="width:100%">Se connecter</button>
    </form>

    <p class="admin-login-footer">Accès réservé au personnel autorisé de Cyber Teck Q.</p>
  </div>
</div>

<script src="api.js?v=910"></script>
<script src="ui-utils.js?v=910"></script>
<script src="admin-login.js?v=910"></script>
</body>
</html>
